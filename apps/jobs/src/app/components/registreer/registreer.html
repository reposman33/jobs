<div>
  <form
    [formGroup]="form"
    (ngSubmit)="registerWithEmail()"
  >
    <input
      type="email"
      formControlName="email"
      placeholder="Email"
    />
    <input
      type="password"
      formControlName="password"
      placeholder="Password"
    />

    <div class="flex justify-end">
      <button
        type="submit"
      >
        Registreer
      </button>
    </div>
  </form>
</div>

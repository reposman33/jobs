<div class="header">
  <div>
    <img
      src="../../../assets/img/jobsearch.svg"
      width="64px"
      alt="Plaatje van een krant met baan advertenties"
    />
  </div>

  <div
    [ngClass]="{
    'header-section': true,
    'align-right': (authService.isAuthenticated$ | async),
    'align-center': !(authService.isAuthenticated$ | async)}"
  >
    <h1 class="title-center">jobs</h1>
  </div>

  <div class="header-section">
    @if(authService.isAuthenticated$ | async) {
    <span
      >Laatste login: {{ (lastLogin$ | async) | date:'EEEE d MMMM y HH:MM:ss'
      }}</span
    >
    <button mat-flat-button (click)="signOut()" class="!bg-[var(--brand-color)]">Log uit</button>
    }
  </div>
</div>
